<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
      body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; user-select: none; }
      .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
      .nav-tab { cursor: pointer; padding: 12px 10px; border-bottom: 3px solid transparent; font-size: 0.875rem; transition: 0.3s; }
      .nav-tab.active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; background-color: white; }
      input, select, textarea { user-select: text; }

      /* ===========================
         BADGE NAMA DARI DATABASE
         =========================== */
      .name-badge {
        display: inline-flex;
        align-items: center;
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
        border-radius: 9999px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .name-badge:hover { background: #dbeafe; transform: scale(1.03); }
      .name-badge.selected {
        background: #1d4ed8;
        color: white;
        border-color: #1d4ed8;
      }
      .name-badge.selected:hover { background: #1e3a8a; }

      /* Skeleton loader */
      .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f8fafc 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 9999px; height: 28px; width: 80px; display: inline-block; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
  </head>
  <body class="p-2 md:p-8" oncontextmenu="return false;">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden mb-10 relative">
      
      <div class="flex border-b border-gray-100 bg-gray-50">
        <div id="tabOrder" onclick="switchView('order')" class="nav-tab active flex-1 text-center">🛒 Order Makan</div>
        <div id="tabAdmin" onclick="switchView('admin')" class="nav-tab flex-1 text-center font-semibold text-gray-500">🔒 Database Karyawan</div>
      </div>

      <!-- ========================================
           VIEW ORDER
           ======================================== -->
      <div id="viewOrder" class="p-4 md:p-6 space-y-6">
        <div class="text-center">
          <h2 class="text-xl font-bold text-gray-800">Form Pemesanan</h2>
          <div id="clock" class="text-blue-600 font-bold text-xs mt-1"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" id="picName" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="Nama PIC">
          <input type="tel" id="picPhone" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="No WA/HP">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <select id="bidang" onchange="handleBidangChange()" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none">
            <option value="" disabled selected>-- Pilih Bidang --</option>
          </select>
          <select id="shift" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none">
            <option value="Non-Shift">Non-Shift</option>
            <option value="Shift Pagi">Shift Pagi</option>
            <option value="Shift Sore">Shift Sore</option>
            <option value="Shift Malam">Shift Malam</option>
          </select>
        </div>

        <!-- ========================================
             PANEL NAMA DARI DATABASE (KLIK TOGGLE)
             ======================================== -->
        <div id="panelNamaDB" class="hidden bg-blue-50 p-4 rounded-2xl border border-blue-100">
          <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-bold text-blue-800 uppercase tracking-wider">
              Pilih Nama dari Database
            </span>
            <span class="text-[9px] text-blue-500 italic">klik nama untuk pilih/hapus</span>
          </div>
          <!-- Nama dari database ditampilkan sebagai badge klik -->
          <div id="dbNameBadges" class="flex flex-wrap gap-2 min-h-[40px]">
            <span class="skeleton"></span>
            <span class="skeleton"></span>
            <span class="skeleton"></span>
          </div>
        </div>

        <!-- ========================================
             DAFTAR NAMA TERPILIH + INPUT MANUAL
             ======================================== -->
        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
          <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-bold text-blue-800 uppercase tracking-wider">Daftar Nama Terpilih</span>
            <span id="countDisplay" class="bg-blue-600 text-white px-2 py-0.5 rounded-full text-[11px] font-bold">0</span>
          </div>
          <div id="nameContainer" class="flex flex-wrap gap-2 p-3 bg-white rounded-xl border border-dashed border-blue-200 min-h-[60px] items-start"></div>
        </div>

        <button onclick="handleSubmit()" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">🚀 KIRIM SEKARANG</button>
      </div>

      <!-- ========================================
           VIEW ADMIN
           ======================================== -->
      <div id="viewAdmin" class="hidden p-4 md:p-6 space-y-6">
        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
          <button onclick="logoutAdmin()" class="text-[10px] font-bold text-red-500 uppercase">🚪 Logout</button>
          <button onclick="switchView('order')" class="text-[10px] font-bold text-gray-500 uppercase">🏠 Kembali</button>
        </div>

        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-200 space-y-3">
          <h3 class="text-[10px] font-bold text-blue-800 uppercase">Tambah Bidang Baru</h3>
          <div class="flex gap-2">
            <input type="text" id="newBidangInput" class="flex-1 px-4 py-2 border rounded-xl text-xs outline-none" placeholder="Contoh: LOGISTIK">
            <button onclick="addNewBidang()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">Tambah</button>
          </div>
        </div>

        <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200 space-y-3">
          <h3 class="text-[10px] font-bold text-gray-600 uppercase">Input Masal (Bidang - Nama)</h3>
          <textarea id="bulkInput" rows="3" class="w-full p-3 border rounded-xl text-xs outline-none" placeholder="IT - Budi&#10;HRD - Siti"></textarea>
          <button onclick="parseBulk()" class="w-full bg-gray-600 text-white py-2 rounded-xl text-xs font-bold uppercase">Proses Masal</button>
        </div>

        <div id="masterView" class="space-y-4 max-h-[40vh] overflow-y-auto pr-1"></div>
      </div>

      <!-- ========================================
           LOGIN MODAL
           ======================================== -->
      <div id="loginModal" class="hidden absolute inset-0 bg-white bg-opacity-95 z-50 flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-xs space-y-4">
          <div class="text-4xl">🔐</div>
          <h3 class="font-bold text-gray-800 uppercase text-sm">Verifikasi Admin</h3>
          <input type="password" id="passInput" class="w-full p-3 border rounded-xl text-center outline-none focus:ring-2 focus:ring-blue-400" placeholder="Password" onkeypress="if(event.key==='Enter') checkPass()">
          <button onclick="checkPass()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold uppercase">Masuk</button>
        </div>
      </div>

      <!-- ========================================
           LOADER
           ======================================== -->
      <div id="loader" class="hidden fixed inset-0 bg-white bg-opacity-80 z-[110] flex flex-col items-center justify-center text-center">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
        <p class="mt-2 text-blue-600 text-[10px] font-bold uppercase">Memproses...</p>
      </div>
    </div>

    <script>
      // ==========================================
      // STATE APLIKASI
      // ==========================================
      let MASTER_DATA = {};        // Data dari cloud (Google Sheets)
      let selectedNames = [];      // Nama yang sudah dipilih untuk dikirim
      let isAuth = false;
      let currentBidang = "";

      // ==========================================
      // INISIALISASI - Load data dari Google Sheets
      // Data disimpan di MASTER_DATA dan langsung
      // dirender ke badge nama (permanen di UI)
      // ==========================================
      window.onload = () => {
        updateClock();
        google.script.run
          .withSuccessHandler(data => {
            MASTER_DATA = data || {};
            populateBidang();         // Isi dropdown bidang
            // Nama dari database sudah siap, akan tampil saat bidang dipilih
          })
          .withFailureHandler(err => {
            console.error("Gagal load data:", err);
            alert("Gagal memuat data. Coba refresh halaman.");
          })
          .getMasterData();
      };

      // Simpan ke cloud & update lokal secara bersamaan
      function syncToCloud() {
        google.script.run
          .withFailureHandler(err => console.error("Gagal sync:", err))
          .saveMasterData(MASTER_DATA);
      }

      // ==========================================
      // NAVIGASI TAB
      // ==========================================
      function switchView(v) {
        if (v === 'admin' && !isAuth) {
          document.getElementById('loginModal').classList.remove('hidden');
          return;
        }
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('viewOrder').classList.toggle('hidden', v !== 'order');
        document.getElementById('viewAdmin').classList.toggle('hidden', v !== 'admin');
        if (v === 'admin') renderAdmin();
        document.getElementById('tabOrder').classList.toggle('active', v === 'order');
        document.getElementById('tabAdmin').classList.toggle('active', v === 'admin');
      }

      function checkPass() {
        if (document.getElementById('passInput').value === "admin123") {
          isAuth = true;
          document.getElementById('passInput').value = "";
          switchView('admin');
        } else {
          alert("Password Salah!");
        }
      }

      function logoutAdmin() { isAuth = false; switchView('order'); }

      // ==========================================
      // DROPDOWN BIDANG
      // ==========================================
      function populateBidang() {
        const sel = document.getElementById('bidang');
        sel.innerHTML = '<option value="" disabled selected>-- Pilih Bidang --</option>';
        Object.keys(MASTER_DATA).sort().forEach(b => {
          sel.innerHTML += `<option value="${b}">${b}</option>`;
        });
      }

      // ==========================================
      // HANDLE PILIH BIDANG
      // Render badge nama dari database MASTER_DATA
      // yang sudah di-load sebelumnya (permanen di memori)
      // ==========================================
      function handleBidangChange() {
        currentBidang = document.getElementById('bidang').value;
        selectedNames = []; // Reset pilihan
        renderDBBadges();   // Tampilkan nama dari database
        renderPills();      // Update daftar terpilih
      }

      // ==========================================
      // RENDER BADGE NAMA DARI DATABASE
      // Badge bisa diklik untuk pilih / batal pilih
      // ==========================================
      function renderDBBadges() {
        const panel = document.getElementById('panelNamaDB');
        const container = document.getElementById('dbNameBadges');

        const names = MASTER_DATA[currentBidang] || [];

        if (names.length === 0) {
          panel.classList.add('hidden');
          return;
        }

        panel.classList.remove('hidden');
        container.innerHTML = "";

        names.forEach(name => {
          const isSelected = selectedNames.includes(name);
          const badge = document.createElement('span');
          badge.className = 'name-badge' + (isSelected ? ' selected' : '');
          badge.textContent = (isSelected ? '✓ ' : '') + name;
          badge.onclick = () => toggleName(name);
          container.appendChild(badge);
        });
      }

      // Toggle: tambah atau hapus nama dari daftar terpilih
      function toggleName(name) {
        const idx = selectedNames.indexOf(name);
        if (idx === -1) {
          selectedNames.push(name);
        } else {
          selectedNames.splice(idx, 1);
        }
        renderDBBadges(); // Refresh badge (update tampilan selected)
        renderPills();    // Refresh daftar terpilih
      }

      // ==========================================
      // RENDER DAFTAR NAMA TERPILIH (PILLS)
      // ==========================================
      function renderPills() {
        const cont = document.getElementById('nameContainer');
        document.getElementById('countDisplay').innerText = selectedNames.length;
        cont.innerHTML = "";

        selectedNames.forEach((n, i) => {
          cont.innerHTML += `
            <div class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-xl text-[11px] font-medium flex items-center border border-blue-200">
              ${n}
              <button onclick="removePill(${i})" class="ml-2 font-bold text-blue-400 hover:text-red-500 text-lg">&times;</button>
            </div>`;
        });

        // Input manual tetap ada
        cont.innerHTML += `
          <div class="flex gap-1 items-center">
            <input type="text" id="manualInput" 
              class="w-32 px-2 py-1.5 border-2 border-blue-200 rounded-xl text-[11px] outline-none" 
              placeholder="+ Manual" 
              onkeypress="if(event.key==='Enter') addManualName()">
            <button onclick="addManualName()" class="bg-blue-600 text-white px-2 py-1.5 rounded-xl text-[10px] font-bold">+</button>
          </div>`;
      }

      // Hapus pill (termasuk de-select badge jika ada di DB)
      function removePill(i) {
        selectedNames.splice(i, 1);
        renderDBBadges();
        renderPills();
      }

      function addManualName() {
        const val = document.getElementById('manualInput').value.trim();
        if (val && !selectedNames.includes(val)) {
          selectedNames.push(val);
          renderDBBadges();
          renderPills();
          // Fokus ulang ke input manual
          setTimeout(() => {
            const inp = document.getElementById('manualInput');
            if (inp) inp.focus();
          }, 50);
        }
      }

      // ==========================================
      // KIRIM PESANAN
      // ==========================================
      function handleSubmit() {
        const pic = document.getElementById('picName').value.trim();
        const phone = document.getElementById('picPhone').value.trim();
        const bidang = document.getElementById('bidang').value;
        const shift = document.getElementById('shift').value;

        if (!pic || !phone || !bidang || selectedNames.length === 0) {
          return alert("Lengkapi data! Pastikan nama karyawan sudah dipilih.");
        }

        document.getElementById('loader').classList.remove('hidden');
        const formData = { pic, phone, bidang, shift, names: selectedNames };

        google.script.run
          .withSuccessHandler(() => {
            document.getElementById('loader').classList.add('hidden');
            alert("TERKIRIM! ✅\n" + selectedNames.length + " nasi untuk " + shift);
            selectedNames = [];
            renderDBBadges();
            renderPills();
            document.getElementById('picName').value = "";
            document.getElementById('picPhone').value = "";
          })
          .withFailureHandler(err => {
            document.getElementById('loader').classList.add('hidden');
            alert("Gagal kirim: " + err.message);
          })
          .processForm(formData);
      }

      // ==========================================
      // ADMIN - KELOLA DATABASE
      // ==========================================
      function addNewBidang() {
        const val = document.getElementById('newBidangInput').value.trim().toUpperCase();
        if (val && !MASTER_DATA[val]) {
          MASTER_DATA[val] = [];
          syncToCloud();
          renderAdmin();
          populateBidang();
          document.getElementById('newBidangInput').value = "";
        }
      }

      function parseBulk() {
        const lines = document.getElementById('bulkInput').value.split('\n');
        let added = 0;
        lines.forEach(l => {
          if (l.includes('-')) {
            const parts = l.split('-');
            const bidang = parts[0].trim().toUpperCase();
            const nama = parts.slice(1).join('-').trim(); // Handle nama dengan tanda '-'
            if (bidang && nama) {
              if (!MASTER_DATA[bidang]) MASTER_DATA[bidang] = [];
              if (!MASTER_DATA[bidang].includes(nama)) {
                MASTER_DATA[bidang].push(nama);
                added++;
              }
            }
          }
        });
        syncToCloud();
        renderAdmin();
        populateBidang();
        document.getElementById('bulkInput').value = "";
        alert("Berhasil! " + added + " nama ditambahkan.");
      }

      function renderAdmin() {
        const cont = document.getElementById('masterView');
        cont.innerHTML = "";
        const sortedKeys = Object.keys(MASTER_DATA).sort();

        if (sortedKeys.length === 0) {
          cont.innerHTML = `<div class="text-center text-gray-400 text-xs py-8">Belum ada data bidang</div>`;
          return;
        }

        sortedKeys.forEach(b => {
          const safeId = b.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '_');
          let namesHtml = MASTER_DATA[b].map((n, i) =>
            `<span class="bg-gray-100 text-[9px] px-2 py-1 rounded flex items-center gap-1">
              ${n}
              <button onclick="removeName('${b}', ${i})" class="text-red-400 font-bold hover:text-red-600">&times;</button>
            </span>`
          ).join('');

          cont.innerHTML += `
            <div class="bg-white border p-3 rounded-2xl shadow-sm space-y-2">
              <div class="flex justify-between font-bold text-[10px] uppercase text-blue-900">
                <span>${b} <span class="text-gray-400 font-normal">(${MASTER_DATA[b].length} orang)</span></span>
                <button onclick="deleteBidang('${b}')" class="text-red-400 hover:text-red-600">Hapus Bidang</button>
              </div>
              <div class="flex gap-2">
                <input type="text" id="in-${safeId}" 
                  class="flex-1 px-2 py-1 border rounded-lg text-xs outline-none" 
                  placeholder="Tambah nama..."
                  onkeypress="if(event.key==='Enter') addOneAdmin('${b}')">
                <button onclick="addOneAdmin('${b}')" class="bg-blue-600 text-white px-2 rounded-lg text-xs font-bold">+</button>
              </div>
              <div class="flex flex-wrap gap-1">${namesHtml}</div>
            </div>`;
        });
      }

      function addOneAdmin(b) {
        const safeId = b.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '_');
        const input = document.getElementById(`in-${safeId}`);
        const val = input ? input.value.trim() : "";
        if (val) {
          if (!MASTER_DATA[b].includes(val)) {
            MASTER_DATA[b].push(val);
          }
          syncToCloud();
          renderAdmin();
          // Refresh badge jika bidang ini sedang aktif
          if (currentBidang === b) renderDBBadges();
          populateBidang();
        }
      }

      function removeName(b, i) {
        const removedName = MASTER_DATA[b][i];
        MASTER_DATA[b].splice(i, 1);
        syncToCloud();
        renderAdmin();
        // Jika nama yang dihapus ada di selectedNames, hapus juga
        const selIdx = selectedNames.indexOf(removedName);
        if (selIdx !== -1) selectedNames.splice(selIdx, 1);
        if (currentBidang === b) renderDBBadges();
        renderPills();
      }

      function deleteBidang(b) {
        if (confirm("Hapus bidang " + b + " beserta semua nama karyawannya?")) {
          delete MASTER_DATA[b];
          syncToCloud();
          renderAdmin();
          populateBidang();
          if (currentBidang === b) {
            currentBidang = "";
            selectedNames = [];
            document.getElementById('panelNamaDB').classList.add('hidden');
            renderPills();
          }
        }
      }

      // ==========================================
      // JAM DIGITAL
      // ==========================================
      function updateClock() {
        document.getElementById('clock').innerHTML = new Date().toLocaleString('id-ID', {
          weekday: 'long', day: '2-digit', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
      }
      setInterval(updateClock, 1000);
      updateClock();
    </script>
  </body>
</html>
