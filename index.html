<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
      body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; user-select: none; }
      .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
      .nav-tab { cursor: pointer; padding: 12px 10px; border-bottom: 3px solid transparent; font-size: 0.875rem; transition: 0.3s; }
      .nav-tab.active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; background-color: white; }
      input, select, textarea { user-select: text; }
    </style>
  </head>
  <body class="p-2 md:p-8" oncontextmenu="return false;">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden mb-10 relative">

      <div class="flex border-b border-gray-100 bg-gray-50">
        <div id="tabOrder" onclick="switchView('order')" class="nav-tab active flex-1 text-center">🛒 Order Makan</div>
        <div id="tabAdmin" onclick="switchView('admin')" class="nav-tab flex-1 text-center font-semibold text-gray-500">🔒 Database Karyawan</div>
      </div>

      <!-- VIEW ORDER -->
      <div id="viewOrder" class="p-4 md:p-6 space-y-6">
        <div class="text-center">
          <h2 class="text-xl font-bold text-gray-800">Form Pemesanan</h2>
          <div id="clock" class="text-blue-600 font-bold text-xs mt-1"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" id="picName" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="Nama PIC">
          <input type="tel" id="picPhone" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="No WA/HP">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <select id="bidang" onchange="handleBidangChange()" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none">
            <option value="" disabled selected>-- Pilih Bidang --</option>
          </select>
          <select id="shift" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none">
            <option value="Non-Shift">Non-Shift</option>
            <option value="Shift Pagi">Shift Pagi</option>
            <option value="Shift Sore">Shift Sore</option>
            <option value="Shift Malam">Shift Malam</option>
          </select>
        </div>

        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
          <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-bold text-blue-800 uppercase tracking-wider">Daftar Nama</span>
            <span id="countDisplay" class="bg-blue-600 text-white px-2 py-0.5 rounded-full text-[11px] font-bold">0</span>
          </div>
          <div id="nameContainer" class="flex flex-wrap gap-2 p-3 bg-white rounded-xl border border-dashed border-blue-200 min-h-[80px] items-start"></div>
        </div>

        <button onclick="handleSubmit()" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">🚀 KIRIM SEKARANG</button>
      </div>

      <!-- VIEW ADMIN -->
      <div id="viewAdmin" class="hidden p-4 md:p-6 space-y-6">
        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
          <button onclick="logoutAdmin()" class="text-[10px] font-bold text-red-500 uppercase">🚪 Logout</button>
          <button onclick="switchView('order')" class="text-[10px] font-bold text-gray-500 uppercase">🏠 Kembali</button>
        </div>

        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-200 space-y-3">
          <h3 class="text-[10px] font-bold text-blue-800 uppercase">Tambah Bidang Baru</h3>
          <div class="flex gap-2">
            <input type="text" id="newBidangInput" class="flex-1 px-4 py-2 border rounded-xl text-xs outline-none" placeholder="Contoh: LOGISTIK">
            <button onclick="addNewBidang()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">Tambah</button>
          </div>
        </div>

        <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200 space-y-3">
          <h3 class="text-[10px] font-bold text-gray-600 uppercase">Input Masal (Bidang - Nama)</h3>
          <textarea id="bulkInput" rows="4" class="w-full p-3 border rounded-xl text-xs outline-none" placeholder="IT - Budi&#10;HRD - Siti&#10;LOGISTIK - Ahmad"></textarea>
          <button onclick="parseBulk()" class="w-full bg-gray-600 text-white py-2 rounded-xl text-xs font-bold uppercase">Proses Masal</button>
        </div>

        <div id="masterView" class="space-y-4 max-h-[40vh] overflow-y-auto pr-1"></div>
      </div>

      <!-- LOGIN MODAL -->
      <div id="loginModal" class="hidden absolute inset-0 bg-white bg-opacity-95 z-50 flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-xs space-y-4">
          <div class="text-4xl">🔐</div>
          <h3 class="font-bold text-gray-800 uppercase text-sm">Verifikasi Admin</h3>
          <input type="password" id="passInput" class="w-full p-3 border rounded-xl text-center outline-none focus:ring-2 focus:ring-blue-400" placeholder="Password" onkeypress="if(event.key==='Enter') checkPass()">
          <button onclick="checkPass()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold uppercase">Masuk</button>
        </div>
      </div>

      <!-- LOADER -->
      <div id="loader" class="hidden fixed inset-0 bg-white bg-opacity-80 z-[110] flex flex-col items-center justify-center text-center">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
        <p class="mt-2 text-blue-600 text-[10px] font-bold uppercase" id="loaderText">Mengirim...</p>
      </div>
    </div>

    <script>
      const GAS_URL = "https://script.google.com/macros/s/AKfycbx4SYs5_wNphL7K7R8IKFQMxGlqtNwNszdXmQJb86ekva2UGcQG4tDSQUAeUhKXu1Ap/exec";

      let MASTER_DATA = {};
      let selectedNames = [];
      let isAuth = false;

      // =============================================
      // LOAD DATA
      // Gunakan no-cors untuk GET juga agar konsisten,
      // tapi karena GET butuh response, tetap pakai cors
      // dengan try/catch yang lebih baik
      // =============================================
      window.onload = () => {
        updateClock();
        fetch(`${GAS_URL}?action=getMasterData`, { redirect: "follow" })
          .then(r => r.json())
          .then(data => {
            MASTER_DATA = data || {};
            populateBidang();
          })
          .catch(err => console.error("Gagal load:", err));
      };

      // =============================================
      // SYNC KE CLOUD — fire and forget pakai no-cors
      // no-cors: browser ga blok, response opaque (ok)
      // =============================================
      function syncToCloud() {
        fetch(GAS_URL, {
          method: "POST",
          redirect: "follow",
          mode: "no-cors", // FIX: hindari CORS error untuk write
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "saveMasterData", data: MASTER_DATA })
        }).catch(err => console.error("Gagal sync:", err));
      }

      // =============================================
      // TAB
      // =============================================
      function switchView(v) {
        if (v === 'admin' && !isAuth) {
          document.getElementById('loginModal').classList.remove('hidden');
          return;
        }
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('viewOrder').classList.toggle('hidden', v !== 'order');
        document.getElementById('viewAdmin').classList.toggle('hidden', v !== 'admin');
        if (v === 'admin') renderAdmin();
        document.getElementById('tabOrder').classList.toggle('active', v === 'order');
        document.getElementById('tabAdmin').classList.toggle('active', v === 'admin');
      }

      function checkPass() {
        if (document.getElementById('passInput').value === "admin123") {
          isAuth = true;
          document.getElementById('passInput').value = "";
          switchView('admin');
        } else { alert("Password Salah!"); }
      }

      function logoutAdmin() { isAuth = false; switchView('order'); }

      // =============================================
      // DROPDOWN BIDANG
      // =============================================
      function populateBidang() {
        const sel = document.getElementById('bidang');
        sel.innerHTML = '<option value="" disabled selected>-- Pilih Bidang --</option>';
        Object.keys(MASTER_DATA).sort().forEach(b => {
          sel.innerHTML += `<option value="${b}">${b}</option>`;
        });
      }

      function handleBidangChange() {
        const bidang = document.getElementById('bidang').value;
        selectedNames = [...(MASTER_DATA[bidang] || [])];
        renderPills();
      }

      // =============================================
      // RENDER PILLS
      // =============================================
      function renderPills() {
        const cont = document.getElementById('nameContainer');
        document.getElementById('countDisplay').innerText = selectedNames.length;
        cont.innerHTML = "";

        selectedNames.forEach((n, i) => {
          cont.innerHTML += `
            <div class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-xl text-[11px] font-medium flex items-center border border-blue-200">
              ${n}
              <button onclick="selectedNames.splice(${i},1); renderPills();" class="ml-2 font-bold text-blue-400 hover:text-red-500 text-lg leading-none">&times;</button>
            </div>`;
        });

        cont.innerHTML += `
          <div class="flex gap-1 items-center">
            <input type="text" id="manualInput"
              class="w-32 px-2 py-1.5 border-2 border-blue-200 rounded-xl text-[11px] outline-none"
              placeholder="+ Manual"
              onkeypress="if(event.key==='Enter') addManualName()">
            <button onclick="addManualName()" class="bg-blue-600 text-white px-2 py-1.5 rounded-xl text-[10px] font-bold">+</button>
          </div>`;
      }

      function addManualName() {
        const val = document.getElementById('manualInput').value.trim();
        if (val) {
          selectedNames.push(val);
          renderPills();
          setTimeout(() => { const inp = document.getElementById('manualInput'); if (inp) inp.focus(); }, 30);
        }
      }

      // =============================================
      // KIRIM PESANAN
      // FIX BUG 1: Pakai no-cors agar ga "Failed to fetch"
      // Karena no-cors response opaque, kita anggap sukses
      // kalau tidak ada network error sama sekali
      // =============================================
      function handleSubmit() {
        const pic = document.getElementById('picName').value.trim();
        const phone = document.getElementById('picPhone').value.trim();
        const bidang = document.getElementById('bidang').value;
        const shift = document.getElementById('shift').value;

        if (!pic || !phone || !bidang || selectedNames.length === 0) {
          return alert("Lengkapi data! Pastikan nama sudah ada.");
        }

        document.getElementById('loader').classList.remove('hidden');

        fetch(GAS_URL, {
          method: "POST",
          redirect: "follow",
          mode: "no-cors", // FIX: pakai no-cors, response akan opaque tapi tidak error
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "processForm",
            data: { pic, phone, bidang, shift, names: selectedNames }
          })
        })
        .then(() => {
          // no-cors response selalu opaque (tidak bisa dibaca),
          // tapi kalau sampai sini berarti request berhasil terkirim
          document.getElementById('loader').classList.add('hidden');
          alert(`TERKIRIM! ✅\n${selectedNames.length} nasi untuk ${shift}`);
          selectedNames = [];
          renderPills();
          document.getElementById('picName').value = "";
          document.getElementById('picPhone').value = "";
          document.getElementById('bidang').value = "";
        })
        .catch(err => {
          // Hanya masuk sini kalau benar-benar network error (offline, dll)
          document.getElementById('loader').classList.add('hidden');
          alert("Gagal kirim (cek koneksi): " + err.message);
        });
      }

      // =============================================
      // ADMIN
      // =============================================
      function addNewBidang() {
        const val = document.getElementById('newBidangInput').value.trim().toUpperCase();
        if (!val || MASTER_DATA[val]) return;
        MASTER_DATA[val] = [];
        document.getElementById('newBidangInput').value = "";
        renderAdmin();
        populateBidang();
        syncToCloud();
      }

      function parseBulk() {
        const lines = document.getElementById('bulkInput').value.split('\n');
        let added = 0;
        lines.forEach(l => {
          const dashIdx = l.indexOf('-');
          if (dashIdx === -1) return;
          const bidang = l.substring(0, dashIdx).trim().toUpperCase();
          const nama = l.substring(dashIdx + 1).trim();
          if (!bidang || !nama) return;
          if (!MASTER_DATA[bidang]) MASTER_DATA[bidang] = [];
          if (!MASTER_DATA[bidang].includes(nama)) { MASTER_DATA[bidang].push(nama); added++; }
        });
        document.getElementById('bulkInput').value = "";
        renderAdmin();
        populateBidang();
        syncToCloud();
        alert(`✅ ${added} nama ditambahkan!`);
      }

      function renderAdmin() {
        const cont = document.getElementById('masterView');
        cont.innerHTML = "";
        const keys = Object.keys(MASTER_DATA).sort();
        if (!keys.length) {
          cont.innerHTML = `<div class="text-center text-gray-400 text-xs py-8">Belum ada data bidang</div>`;
          return;
        }
        keys.forEach(b => {
          const safeId = b.replace(/[^a-zA-Z0-9]/g, '_');
          const namesHtml = MASTER_DATA[b].map((n, i) =>
            `<span class="bg-gray-100 text-[9px] px-2 py-1 rounded flex items-center gap-1">${n}
              <button onclick="removeName('${b}',${i})" class="text-red-400 font-bold">&times;</button>
            </span>`
          ).join('');
          cont.innerHTML += `
            <div class="bg-white border p-3 rounded-2xl shadow-sm space-y-2">
              <div class="flex justify-between font-bold text-[10px] uppercase text-blue-900">
                <span>${b} <span class="text-gray-400 font-normal">(${MASTER_DATA[b].length})</span></span>
                <button onclick="deleteBidang('${b}')" class="text-red-400">Hapus</button>
              </div>
              <div class="flex gap-2">
                <input type="text" id="in-${safeId}" class="flex-1 px-2 py-1 border rounded-lg text-xs outline-none" placeholder="Tambah nama..." onkeypress="if(event.key==='Enter') addOneAdmin('${b}')">
                <button onclick="addOneAdmin('${b}')" class="bg-blue-600 text-white px-2 rounded-lg text-xs font-bold">+</button>
              </div>
              <div class="flex flex-wrap gap-1">${namesHtml}</div>
            </div>`;
        });
      }

      function addOneAdmin(b) {
        const safeId = b.replace(/[^a-zA-Z0-9]/g, '_');
        const input = document.getElementById(`in-${safeId}`);
        const val = input ? input.value.trim() : "";
        if (!val) return;
        if (!MASTER_DATA[b].includes(val)) MASTER_DATA[b].push(val);
        if (input) input.value = "";
        renderAdmin();
        syncToCloud();
      }

      function removeName(b, i) {
        MASTER_DATA[b].splice(i, 1);
        renderAdmin();
        syncToCloud();
      }

      function deleteBidang(b) {
        if (!confirm("Hapus bidang " + b + "?")) return;
        delete MASTER_DATA[b];
        renderAdmin();
        populateBidang();
        syncToCloud();
      }

      // =============================================
      // JAM
      // =============================================
      function updateClock() {
        document.getElementById('clock').innerHTML = new Date().toLocaleString('id-ID', {
          weekday: 'long', day: '2-digit', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
      }
      setInterval(updateClock, 1000);
      updateClock();
    </script>
  </body>
</html>
